<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediBot Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 50%, #f1f5f9 100%);
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08), 
                        0 0 0 1px rgba(255, 255, 255, 0.6) inset;
        }
        
        .dispatch-btn {
            background: linear-gradient(145deg, #ffffff 0%, #f8fafc 100%);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .dispatch-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            transition: left 0.7s;
        }
        
        .dispatch-btn:hover::before {
            left: 100%;
        }
        
        .dispatch-btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.15);
        }
        
        .dispatch-btn:active {
            transform: translateY(-2px) scale(0.98);
        }
        
        .dispatch-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .icon-container {
            transition: all 0.3s ease;
        }
        
        .dispatch-btn:hover .icon-container {
            transform: scale(1.1) rotate(5deg);
        }
        
        .ambient-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            pointer-events: none;
            z-index: -1;
        }
        
        .glow-1 {
            background: radial-gradient(circle, rgba(59, 130, 246, 0.3) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            animation: float 20s infinite ease-in-out;
        }
        
        .glow-2 {
            background: radial-gradient(circle, rgba(239, 68, 68, 0.2) 0%, transparent 70%);
            bottom: -200px;
            left: -200px;
            animation: float 25s infinite ease-in-out reverse;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 50px) scale(1.1); }
        }
        
        .slide-up {
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .pulse-ring {
            animation: pulseRing 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        
        @keyframes pulseRing {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(2.5); opacity: 0; }
        }
        
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        .status-line {
            position: relative;
            overflow: hidden;
        }
        
        .status-line::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: currentColor;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }
        
        .status-line.active::after {
            transform: scaleX(1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col text-slate-800 overflow-x-hidden">
    <!-- Ambient Background Effects -->
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <!-- Header -->
    <header class="relative z-10 px-8 py-6">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="relative">
                    <div class="absolute -inset-2 bg-gradient-to-r from-blue-600 to-cyan-500 rounded-2xl blur opacity-30 animate-pulse"></div>
                    <div class="relative bg-gradient-to-br from-blue-600 to-blue-700 p-3 rounded-xl shadow-lg shadow-blue-500/30">
                        <i data-lucide="bot" class="w-8 h-8 text-white"></i>
                    </div>
                </div>
                <div>
                    <h1 class="text-2xl font-bold bg-gradient-to-r from-slate-900 to-slate-600 bg-clip-text text-transparent">MediBot</h1>
                    <p class="text-xs font-medium text-slate-500 tracking-wide uppercase">Autonomous Medical Unit</p>
                </div>
            </div>
            
            <div class="flex items-center gap-3 bg-white/60 backdrop-blur-sm px-4 py-2 rounded-full border border-slate-200/60 shadow-sm">
                <span class="relative flex h-2.5 w-2.5">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>
                </span>
                <span class="text-sm font-semibold text-slate-700">System Online</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex items-center justify-center p-8 relative z-10">
        <div class="w-full max-w-3xl">
            
            <!-- Hero Section -->
            <div class="text-center mb-12 slide-up">
                <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/60 backdrop-blur-sm border border-slate-200/60 mb-6 shadow-sm">
                    <i data-lucide="radio" class="w-4 h-4 text-blue-600"></i>
                    <span class="text-sm font-medium text-slate-700">Live Connection</span>
                </div>
                <h2 class="text-5xl font-extrabold text-slate-900 mb-4 tracking-tight">
                    Command Center
                </h2>
                <p class="text-lg text-slate-500 font-medium max-w-md mx-auto">
                    Select destination to dispatch autonomous medical delivery unit
                </p>
            </div>

            <!-- Dispatch Cards -->
            <div class="grid md:grid-cols-2 gap-6 slide-up" style="animation-delay: 0.1s;">
                
                <!-- Operating Room -->
                <button onclick="dispatch('OR')" id="btn-or" class="dispatch-btn glass-panel rounded-3xl p-8 group relative">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-gradient-to-br from-red-100 to-transparent rounded-full -mr-16 -mt-16 opacity-50 group-hover:opacity-80 transition-opacity"></div>
                    
                    <div class="relative">
                        <div class="flex items-start justify-between mb-6">
                            <div class="icon-container w-16 h-16 bg-gradient-to-br from-red-500 to-red-600 rounded-2xl flex items-center justify-center shadow-lg shadow-red-500/30">
                                <i data-lucide="activity" class="w-8 h-8 text-white"></i>
                            </div>
                            <div class="opacity-0 group-hover:opacity-100 transition-all duration-300 transform translate-x-2 group-hover:translate-x-0">
                                <div class="w-10 h-10 rounded-full bg-red-50 flex items-center justify-center">
                                    <i data-lucide="arrow-up-right" class="w-5 h-5 text-red-600"></i>
                                </div>
                            </div>
                        </div>
                        
                        <h3 class="text-2xl font-bold text-slate-900 mb-2 group-hover:text-red-600 transition-colors">Operating Room</h3>
                        <p class="text-slate-500 font-medium mb-4">Surgical Suite A</p>
                        
                        <div class="flex items-center gap-2 text-sm font-semibold text-slate-400 group-hover:text-red-500 transition-colors">
                            <span>Click to dispatch</span>
                            <i data-lucide="chevron-right" class="w-4 h-4 transform group-hover:translate-x-1 transition-transform"></i>
                        </div>
                    </div>
                    
                    <!-- Progress bar for dispatch state -->
                    <div id="progress-or" class="absolute bottom-0 left-0 h-1 bg-gradient-to-r from-red-500 to-red-600 w-0 transition-all duration-300 rounded-b-3xl"></div>
                </button>

                <!-- Emergency Room -->
                <button onclick="dispatch('ER')" id="btn-er" class="dispatch-btn glass-panel rounded-3xl p-8 group relative">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-gradient-to-br from-amber-100 to-transparent rounded-full -mr-16 -mt-16 opacity-50 group-hover:opacity-80 transition-opacity"></div>
                    
                    <div class="relative">
                        <div class="flex items-start justify-between mb-6">
                            <div class="icon-container w-16 h-16 bg-gradient-to-br from-amber-500 to-orange-500 rounded-2xl flex items-center justify-center shadow-lg shadow-amber-500/30">
                                <i data-lucide="siren" class="w-8 h-8 text-white"></i>
                            </div>
                            <div class="opacity-0 group-hover:opacity-100 transition-all duration-300 transform translate-x-2 group-hover:translate-x-0">
                                <div class="w-10 h-10 rounded-full bg-amber-50 flex items-center justify-center">
                                    <i data-lucide="arrow-up-right" class="w-5 h-5 text-amber-600"></i>
                                </div>
                            </div>
                        </div>
                        
                        <h3 class="text-2xl font-bold text-slate-900 mb-2 group-hover:text-amber-600 transition-colors">Emergency Room</h3>
                        <p class="text-slate-500 font-medium mb-4">Trauma Center</p>
                        
                        <div class="flex items-center gap-2 text-sm font-semibold text-slate-400 group-hover:text-amber-500 transition-colors">
                            <span>Click to dispatch</span>
                            <i data-lucide="chevron-right" class="w-4 h-4 transform group-hover:translate-x-1 transition-transform"></i>
                        </div>
                    </div>
                    
                    <!-- Progress bar for dispatch state -->
                    <div id="progress-er" class="absolute bottom-0 left-0 h-1 bg-gradient-to-r from-amber-500 to-orange-500 w-0 transition-all duration-300 rounded-b-3xl"></div>
                </button>
            </div>

            <!-- Status Area -->
            <div class="mt-10 text-center slide-up" style="animation-delay: 0.2s;">
                <div id="status-container" class="inline-flex items-center gap-3 px-6 py-3 rounded-full bg-white/60 backdrop-blur-sm border border-slate-200/60 shadow-sm transition-all duration-300">
                    <div id="status-icon" class="w-2 h-2 rounded-full bg-slate-400"></div>
                    <p id="status-text" class="text-sm font-semibold text-slate-600">Ready for dispatch</p>
                </div>
            </div>

        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 translate-y-24 opacity-0 transition-all duration-500 z-50 w-full max-w-md px-6">
        <div class="glass-panel rounded-2xl px-6 py-4 shadow-2xl flex items-center gap-4 border border-white/50">
            <div id="toast-icon" class="flex-shrink-0 w-12 h-12 rounded-full bg-gradient-to-br from-emerald-400 to-emerald-600 flex items-center justify-center shadow-lg">
                <i data-lucide="check" class="w-6 h-6 text-white"></i>
            </div>
            <div class="flex-1">
                <p id="toast-title" class="font-bold text-slate-900 text-lg">Success</p>
                <p id="toast-message" class="text-sm text-slate-600 font-medium">Command executed</p>
            </div>
        </div>
    </div>

    <script>
        // JSONBin Configuration
        const BIN_URL = 'https://api.jsonbin.io/v3/b/69a3be1bd0ea881f40e3bebc';
        const API_KEY = '$2a$10$z.0vVEGdMcN5po9LNgJoWOpNep.WRK/KKSpa1c6zAgAQxvDTrHU1m';

        // Initialize icons
        lucide.createIcons();

        let isDispatching = false;

        async function dispatch(location) {
            if (isDispatching) return;
            
            isDispatching = true;
            const destName = location === 'OR' ? 'Operating Room' : 'Emergency Room';
            const color = location === 'OR' ? 'red' : 'amber';
            const btnId = location === 'OR' ? 'btn-or' : 'btn-er';
            const progressId = location === 'OR' ? 'progress-or' : 'progress-er';
            
            // Disable buttons
            document.getElementById('btn-or').disabled = true;
            document.getElementById('btn-er').disabled = true;
            
            // Update status with visual feedback
            updateStatus(`Dispatching to ${destName}...`, color, true);
            
            // Animate progress bar
            const progressBar = document.getElementById(progressId);
            progressBar.style.width = '30%';
            
            // Show toast
            showToast('Dispatching', `Sending ${destName} command...`, color);

            try {
                const payload = {
                    command: location === 'OR' ? 'O' : 'E',
                    timestamp: Date.now()
                };

                const response = await fetch(BIN_URL, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error('Failed');

                // Success animation
                progressBar.style.width = '100%';
                
                setTimeout(() => {
                    showToast('En Route', `MediBot dispatched to ${destName}`, 'success');
                    updateStatus(`En route to ${destName}`, color, false);
                    
                    setTimeout(() => {
                        // Reset
                        isDispatching = false;
                        progressBar.style.width = '0%';
                        document.getElementById('btn-or').disabled = false;
                        document.getElementById('btn-er').disabled = false;
                        updateStatus('Ready for dispatch', 'slate', false);
                    }, 3000);
                }, 800);

            } catch (error) {
                progressBar.style.width = '0%';
                showToast('Error', 'Dispatch failed. Retrying...', 'error');
                updateStatus('Connection error', 'red', false);
                isDispatching = false;
                document.getElementById('btn-or').disabled = false;
                document.getElementById('btn-er').disabled = false;
            }
        }

        function updateStatus(message, color, isActive) {
            const container = document.getElementById('status-container');
            const icon = document.getElementById('status-icon');
            const text = document.getElementById('status-text');
            
            const colors = {
                red: 'bg-red-500',
                amber: 'bg-amber-500',
                slate: 'bg-slate-400',
                emerald: 'bg-emerald-500'
            };
            
            icon.className = `w-2 h-2 rounded-full ${colors[color] || colors.slate} ${isActive ? 'animate-pulse' : ''}`;
            text.textContent = message;
            text.className = `text-sm font-semibold text-${color === 'slate' ? 'slate-600' : color + '-600'}`;
        }

        function showToast(title, message, type) {
            const toast = document.getElementById('toast');
            const toastTitle = document.getElementById('toast-title');
            const toastMessage = document.getElementById('toast-message');
            const toastIcon = document.getElementById('toast-icon');
            
            const configs = {
                red: { 
                    gradient: 'from-red-400 to-red-600', 
                    icon: 'activity',
                    titleColor: 'text-red-600'
                },
                amber: { 
                    gradient: 'from-amber-400 to-orange-500', 
                    icon: 'siren',
                    titleColor: 'text-amber-600'
                },
                success: { 
                    gradient: 'from-emerald-400 to-emerald-600', 
                    icon: 'check',
                    titleColor: 'text-emerald-600'
                },
                error: { 
                    gradient: 'from-red-400 to-red-600', 
                    icon: 'alert-triangle',
                    titleColor: 'text-red-600'
                }
            };
            
            const config = configs[type] || configs.success;
            
            toastIcon.className = `flex-shrink-0 w-12 h-12 rounded-full bg-gradient-to-br ${config.gradient} flex items-center justify-center shadow-lg`;
            toastIcon.innerHTML = `<i data-lucide="${config.icon}" class="w-6 h-6 text-white"></i>`;
            toastTitle.className = `font-bold ${config.titleColor} text-lg`;
            toastTitle.textContent = title;
            toastMessage.textContent = message;
            
            lucide.createIcons();
            
            toast.classList.remove('translate-y-24', 'opacity-0');
            
            setTimeout(() => {
                toast.classList.add('translate-y-24', 'opacity-0');
            }, 3500);
        }
    </script>
</body>
</html>
